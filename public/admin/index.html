<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio admin — Vesta Folio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/brand/favicon.ico">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <link rel="stylesheet" href="/admin/dashboard.css">
</head>
<body class="admin-page">
  <nav class="admin__nav" aria-label="Studio admin">
    <a class="admin__nav-logo" href="/admin" aria-label="Vesta Folio admin home">
      <img src="/brand/vesta-folio-horizontal.svg" alt="Vesta Folio" width="160">
    </a>
    <div class="admin__nav-links">
      <a class="admin__nav-link admin__nav-link--active" href="/admin" aria-current="page">Dashboard</a>
      <a class="admin__nav-link" href="/admin/projects">Projects</a>
      <a class="admin__nav-link" href="/admin/leads">Leads</a>
      <a class="admin__nav-link" href="/admin/account">Account</a>
      <button class="admin__nav-logout" id="logout-btn" type="button">Log out</button>
    </div>
  </nav>

  <main class="admin__main admin__main--wide">
    <div class="admin__loading" id="page-loading"><p>One moment.</p></div>
    <div id="page-content" hidden>

      <div class="dash__header">
        <p class="admin__label">STUDIO ADMIN</p>
        <h1 class="admin__heading">Dashboard.</h1>
      </div>

      <!-- Stat cards -->
      <div class="dash__stats">
        <div class="dash__stat">
          <p class="dash__stat-value" id="stat-inquiries">—</p>
          <p class="dash__stat-label">Inquiries this month</p>
        </div>
        <div class="dash__stat">
          <p class="dash__stat-value dash__stat-value--alert" id="stat-unassigned">—</p>
          <p class="dash__stat-label">Awaiting response</p>
        </div>
        <div class="dash__stat">
          <p class="dash__stat-value" id="stat-active">—</p>
          <p class="dash__stat-label">Active projects</p>
        </div>
        <div class="dash__stat">
          <p class="dash__stat-value" id="stat-delivered">—</p>
          <p class="dash__stat-label">Delivered this month</p>
        </div>
      </div>

      <div class="dash__panels">

        <!-- Recent leads -->
        <div class="dash__panel">
          <div class="dash__panel-header">
            <p class="admin__label">RECENT LEADS</p>
            <a class="dash__panel-link" href="/admin/leads">View all</a>
          </div>
          <div id="recent-leads"></div>
        </div>

        <!-- Active projects -->
        <div class="dash__panel">
          <div class="dash__panel-header">
            <p class="admin__label">CLIENT PROJECTS</p>
            <a class="dash__panel-link" href="/admin/projects">View all</a>
          </div>
          <div id="active-projects"></div>
        </div>

      </div>

    </div>
  </main>

  <script type="module">
    const logoutBtn = document.getElementById('logout-btn');
    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/admin/login';
    });

    (async () => {
      const me = await fetch('/api/auth/me', { headers: { Accept: 'application/json' } });
      if (!me.ok) { window.location.href = '/admin/login'; return; }

      const res  = await fetch('/api/admin/dashboard', { headers: { Accept: 'application/json' } });
      const body = res.ok ? await res.json() : null;

      document.getElementById('page-loading').hidden = true;
      document.getElementById('page-content').hidden = false;

      if (!body) return;

      const s = body.stats || {};
      document.getElementById('stat-inquiries').textContent  = s.inquiries_this_month ?? '—';
      document.getElementById('stat-unassigned').textContent = s.unassigned_leads ?? '—';
      document.getElementById('stat-active').textContent     = s.active_projects ?? '—';
      document.getElementById('stat-delivered').textContent  = s.delivered_this_month ?? '—';

      // Recent leads
      const leadsEl = document.getElementById('recent-leads');
      const leads   = body.recent_leads || [];
      if (leads.length === 0) {
        leadsEl.innerHTML = '<p class="dash__empty">No leads yet.</p>';
      } else {
        leadsEl.innerHTML = leads.map(l => `
          <a class="dash__row" href="/admin/leads?id=${l.id}">
            <span class="dash__row-primary">${esc(l.name)}</span>
            <span class="dash__row-secondary">${esc(l.property_address)}</span>
            <span class="dash__badge dash__badge--${statusClass(l.status)}">${esc(l.status)}</span>
          </a>
        `).join('');
      }

      // Active projects
      const projEl   = document.getElementById('active-projects');
      const projects = body.active_projects || [];
      if (projects.length === 0) {
        projEl.innerHTML = '<p class="dash__empty">No client projects yet.</p>';
      } else {
        projEl.innerHTML = projects.map(p => `
          <a class="dash__row" href="/admin/client-project?id=${p.id}">
            <span class="dash__row-primary">${esc(p.title)}</span>
            <span class="dash__row-secondary">${esc(p.location)} · ${p.year}</span>
          </a>
        `).join('');
      }
    })();

    function statusClass(s) {
      const map = { Unassigned: 'neutral', Contacted: 'blue', Booked: 'gold', Filming: 'gold', Editing: 'gold', Delivered: 'green', Archived: 'neutral' };
      return map[s] || 'neutral';
    }
    function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
