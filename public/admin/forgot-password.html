<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Vesta Folio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/brand/favicon.ico">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/admin/login.css">
</head>
<body class="login-page">

  <main class="login">
    <div class="login__inner">

      <a class="login__logo" href="/" aria-label="Vesta Folio home">
        <img src="/brand/vesta-folio-horizontal.svg" alt="Vesta Folio" width="200">
      </a>

      <p class="login__label">STUDIO ACCESS</p>
      <h1 class="login__heading">Reset your password.</h1>
      <p class="login__body">
        Enter your email and we'll send a link to set a new password.
      </p>

      <form class="login__form" id="forgot-form" novalidate>

        <div class="login__field">
          <label class="login__label-input" for="email">Email</label>
          <input
            class="login__input"
            type="email"
            id="email"
            name="email"
            required
            autocomplete="username"
            placeholder="name@email.com"
            autofocus
          >
        </div>

        <p class="login__error" id="forgot-error" role="alert" hidden></p>

        <button class="login__submit" type="submit">
          Send reset link
        </button>

      </form>

      <div class="login__success" id="forgot-success" hidden>
        <p style="margin: 0;">
          If an account exists with that email, a reset link is on its way. The link expires in 24 hours.
        </p>
      </div>

      <p class="login__footer">
        <a class="login__link" href="/admin/login">Back to sign in</a>
      </p>

    </div>
  </main>

  <script src="/admin/forgot-password.js" type="module"></script>
</body>
</html>
