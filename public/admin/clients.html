<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients - Vesta Folio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/brand/favicon.ico">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <link rel="stylesheet" href="/admin/dashboard.css">
</head>
<body class="admin-page">
  <nav class="admin__nav" aria-label="Studio admin">
    <a class="admin__nav-logo" href="/admin" aria-label="Vesta Folio admin home">
      <img src="/brand/vesta-folio-horizontal.svg" alt="Vesta Folio" width="160">
    </a>
    <div class="admin__nav-links">
      <a class="admin__nav-link" href="/admin">Dashboard</a>
      <a class="admin__nav-link" href="/admin/projects">Projects</a>
      <a class="admin__nav-link" href="/admin/leads">Leads</a>
      <a class="admin__nav-link admin__nav-link--active" href="/admin/clients" aria-current="page">Clients</a>
      <a class="admin__nav-link" href="/admin/team" id="nav-team" hidden>Team</a>
      <a class="admin__nav-link" href="/admin/account">Account</a>
      <button class="admin__nav-logout" id="logout-btn" type="button">Log out</button>
    </div>
  </nav>

  <main class="admin__main admin__main--wide">
    <div class="admin__loading" id="page-loading"><p>One moment.</p></div>

    <div id="page-content" hidden>
      <div class="projects__header">
        <div>
          <p class="admin__label">PORTAL</p>
          <h1 class="admin__heading">Clients.</h1>
        </div>
      </div>

      <div style="margin-bottom:var(--space-5);">
        <input class="leads__search" type="search" id="search-input" placeholder="Search name or email..." autocomplete="off" style="max-width:340px;">
      </div>

      <p class="admin__error" id="page-error" hidden></p>

      <div class="projects__table-wrap" id="clients-table-wrap" hidden>
        <table class="projects__table">
          <thead>
            <tr>
              <th class="projects__th">Name</th>
              <th class="projects__th">Email</th>
              <th class="projects__th projects__th--meta">Projects</th>
              <th class="projects__th projects__th--meta">Last login</th>
              <th class="projects__th projects__th--actions">Actions</th>
            </tr>
          </thead>
          <tbody id="clients-tbody"></tbody>
        </table>
      </div>
      <div class="projects__empty" id="clients-empty" hidden>
        <p class="admin__body admin__body--muted">No clients found.</p>
      </div>
    </div>
  </main>

  <!-- Client detail modal -->
  <div class="modal-overlay" id="detail-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title" style="max-width:600px;">
      <div class="modal__header">
        <h2 class="modal__title" id="detail-modal-title">Client</h2>
        <button class="modal__close" id="detail-modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <script src="/admin/clients.js" type="module"></script>
</body>
</html>
