<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients - Vesta Folio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/brand/favicon.ico">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <link rel="stylesheet" href="/admin/dashboard.css">
</head>
<body class="admin-page">
  <nav class="admin__nav" aria-label="Studio admin">
    <a class="admin__nav-logo" href="/admin" aria-label="Vesta Folio admin home">
      <img src="/brand/vesta-folio-horizontal.svg" alt="Vesta Folio" width="160">
    </a>
    <div class="admin__nav-links">
      <a class="admin__nav-link" href="/admin">Dashboard</a>
      <a class="admin__nav-link" href="/admin/projects">Projects</a>
      <a class="admin__nav-link" href="/admin/leads">Leads</a>
      <a class="admin__nav-link admin__nav-link--active" href="/admin/clients" aria-current="page">Clients</a>
      <a class="admin__nav-link" href="/admin/team" id="nav-team" hidden>Team</a>
      <a class="admin__nav-link" href="/admin/account">Account</a>
      <button class="admin__nav-logout" id="logout-btn" type="button">Log out</button>
    </div>
  </nav>

  <main class="admin__main admin__main--wide">
    <div class="admin__loading" id="page-loading"><p>One moment.</p></div>

    <div id="page-content" hidden>
      <div class="projects__header">
        <div>
          <p class="admin__label">PORTAL</p>
          <h1 class="admin__heading">Clients.</h1>
        </div>
      </div>

      <div style="margin-bottom:var(--space-5);">
        <input class="leads__search" type="search" id="search-input" placeholder="Search name or email..." autocomplete="off" style="max-width:340px;">
      </div>

      <p class="admin__error" id="page-error" hidden></p>

      <div class="projects__table-wrap" id="clients-table-wrap" hidden>
        <table class="projects__table">
          <thead>
            <tr>
              <th class="projects__th">Name</th>
              <th class="projects__th">Email</th>
              <th class="projects__th projects__th--meta">Projects</th>
              <th class="projects__th projects__th--meta">Last login</th>
              <th class="projects__th projects__th--actions" style="min-width:120px;">Actions</th>
            </tr>
          </thead>
          <tbody id="clients-tbody"></tbody>
        </table>
      </div>
      <div class="projects__empty" id="clients-empty" hidden>
        <p class="admin__body admin__body--muted">No clients found.</p>
      </div>
    </div>
  </main>

  <!-- Client detail modal -->
  <div class="modal-overlay" id="detail-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title" style="max-width:600px;">
      <div class="modal__header">
        <h2 class="modal__title" id="detail-modal-title">Client</h2>
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <button class="admin__btn-ghost" id="detail-edit-btn" type="button" hidden>Edit</button>
          <button class="admin__btn-danger" id="detail-delete-btn" type="button" hidden>Delete</button>
          <button class="modal__close" id="detail-modal-close" type="button" aria-label="Close">&times;</button>
        </div>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>

  <!-- Edit client modal -->
  <div class="modal-overlay" id="edit-modal" hidden>
    <div class="modal modal--narrow" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
      <div class="modal__header">
        <h2 class="modal__title" id="edit-modal-title">Edit client</h2>
        <button class="modal__close" id="edit-modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <form id="edit-form" novalidate>
        <div class="admin__field" style="margin-bottom:var(--space-4);">
          <label class="admin__label-input" for="edit-name">Name</label>
          <input class="admin__input" type="text" id="edit-name" autocomplete="off" required>
        </div>
        <div class="admin__field" style="margin-bottom:var(--space-5);">
          <label class="admin__label-input" for="edit-email">Email</label>
          <input class="admin__input" type="email" id="edit-email" autocomplete="off" required>
        </div>
        <p class="admin__error" id="edit-error" hidden></p>
        <div class="modal__footer">
          <button class="admin__btn-ghost" id="edit-cancel" type="button">Cancel</button>
          <button class="admin__btn-primary" id="edit-submit" type="submit">Save changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete client confirm modal -->
  <div class="modal-overlay" id="delete-modal" hidden>
    <div class="modal modal--narrow" role="dialog" aria-modal="true">
      <div class="modal__header">
        <h2 class="modal__title">Delete client?</h2>
        <button class="modal__close" id="delete-modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <p class="admin__body" id="delete-modal-body"></p>
      <p class="admin__body admin__body--muted" style="font-size:var(--text-body-sm);">All portal access will be revoked. This cannot be undone.</p>
      <p class="admin__error" id="delete-error" hidden></p>
      <div class="modal__footer">
        <button class="admin__btn-ghost" id="delete-cancel" type="button">Cancel</button>
        <button class="admin__btn-danger" id="delete-confirm" type="button">Delete</button>
      </div>
    </div>
  </div>

  <script src="/admin/clients.js" type="module"></script>
</body>
</html>
