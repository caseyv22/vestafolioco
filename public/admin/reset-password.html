<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password — Vesta Folio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/brand/favicon.ico">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/admin/login.css">
</head>
<body class="login-page">

  <main class="login">
    <div class="login__inner">

      <a class="login__logo" href="/" aria-label="Vesta Folio home">
        <img src="/brand/vesta-folio-horizontal.svg" alt="Vesta Folio" width="200">
      </a>

      <p class="login__label">STUDIO ACCESS</p>
      <h1 class="login__heading">Set a new password.</h1>

      <form class="login__form" id="reset-form" novalidate hidden>

        <div class="login__field">
          <label class="login__label-input" for="new-password">New password</label>
          <input
            class="login__input"
            type="password"
            id="new-password"
            name="new_password"
            required
            autocomplete="new-password"
            minlength="8"
            autofocus
          >
          <p class="login__hint">At least 8 characters.</p>
        </div>

        <div class="login__field">
          <label class="login__label-input" for="confirm-password">Confirm new password</label>
          <input
            class="login__input"
            type="password"
            id="confirm-password"
            name="confirm_password"
            required
            autocomplete="new-password"
            minlength="8"
          >
        </div>

        <p class="login__error" id="reset-error" role="alert" hidden></p>

        <button class="login__submit" type="submit">
          Set new password
        </button>

      </form>

      <div class="login__success" id="reset-success" hidden>
        <p style="margin: 0;">
          Your password has been updated. Redirecting you to sign in…
        </p>
      </div>

      <div class="login__error-state" id="reset-invalid" hidden>
        <p class="login__body" id="reset-invalid-message">This reset link is invalid or has expired.</p>
        <p class="login__footer">
          <a class="login__link" href="/admin/forgot-password">Request a new reset link</a>
        </p>
      </div>

    </div>
  </main>

  <script src="/admin/reset-password.js" type="module"></script>
</body>
</html>
