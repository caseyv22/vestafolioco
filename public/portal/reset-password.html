<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password — Vesta Folio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/brand/favicon.ico">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/admin/login.css">
</head>
<body class="login-page">
  <main class="login">
    <div class="login__inner">
      <a class="login__logo" href="/" aria-label="Vesta Folio home">
        <img src="/brand/vesta-folio-horizontal.svg" alt="Vesta Folio" width="180">
      </a>
      <p class="login__label">CLIENT PORTAL</p>
      <div id="invalid-state" hidden>
        <h1 class="login__heading">This link has expired.</h1>
        <p class="login__body">Request a new one below.</p>
        <p class="login__footer"><a class="login__link" href="/portal/forgot-password">Request new link</a></p>
      </div>
      <div id="form-state" hidden>
        <h1 class="login__heading">Set a new password.</h1>
        <p class="login__error" id="reset-error" hidden></p>
        <form class="login__form" id="reset-form" novalidate>
          <div class="login__field">
            <label class="login__label-input" for="password">New password</label>
            <input class="login__input" type="password" id="password" name="password"
                   autocomplete="new-password" required minlength="8">
            <p class="login__hint">At least 8 characters.</p>
          </div>
          <div class="login__field">
            <label class="login__label-input" for="confirm">Confirm password</label>
            <input class="login__input" type="password" id="confirm" name="confirm"
                   autocomplete="new-password" required>
          </div>
          <button class="login__submit" type="submit" id="reset-submit">Set new password</button>
        </form>
      </div>
    </div>
  </main>
  <script type="module">
    const params  = new URLSearchParams(window.location.search);
    const token   = params.get('token') || '';
    const invalid = document.getElementById('invalid-state');
    const formDiv = document.getElementById('form-state');
    const error   = document.getElementById('reset-error');
    const form    = document.getElementById('reset-form');
    const submit  = document.getElementById('reset-submit');

    if (!token) { invalid.hidden = false; } else { formDiv.hidden = false; }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.hidden = true;
      const password = form.password.value;
      const confirm  = form.confirm.value;
      if (password.length < 8) { error.textContent = 'Password must be at least 8 characters.'; error.hidden = false; return; }
      if (password !== confirm) { error.textContent = 'Passwords do not match.'; error.hidden = false; return; }

      submit.disabled = true;
      submit.textContent = 'Updating…';
      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: password }),
        });
        const body = await res.json().catch(() => ({}));
        if (res.ok) { window.location.href = '/portal/login'; return; }
        if (res.status === 400 && body.error?.includes('expired')) { formDiv.hidden = true; invalid.hidden = false; return; }
        error.textContent = body.error || 'Could not update password.';
        error.hidden = false;
      } catch {
        error.textContent = 'Could not connect. Try again.';
        error.hidden = false;
      } finally {
        submit.disabled = false;
        submit.textContent = 'Set new password';
      }
    });
  </script>
</body>
</html>
