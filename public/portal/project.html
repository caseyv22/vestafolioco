<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Vesta Folio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/brand/favicon.ico">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <link rel="stylesheet" href="/portal/portal.css">
</head>
<body class="admin-page">

  <nav class="admin__nav" aria-label="Client portal">
    <a class="admin__nav-logo" href="/portal" aria-label="Vesta Folio portal home">
      <img src="/brand/vesta-folio-horizontal.svg" alt="Vesta Folio" width="160">
    </a>
    <div class="admin__nav-links">
      <a class="admin__nav-link" href="/portal">My projects</a>
      <a class="admin__nav-link" href="/portal/account">Account</a>
      <button class="admin__nav-logout" id="logout-btn" type="button">Sign out</button>
    </div>
  </nav>

  <main class="admin__main admin__main--wide">

    <div class="admin__loading" id="page-loading"><p>One moment.</p></div>

    <div id="page-error-wrap" hidden>
      <p class="admin__body" id="page-error-msg"></p>
      <a class="projects__action" href="/portal">← Back to projects</a>
    </div>

    <div id="page-content" hidden>

      <a class="project-edit__back" href="/portal">← All projects</a>

      <div class="portal__project-header">
        <div>
          <p class="admin__label" id="project-location"></p>
          <h1 class="admin__heading" id="project-title"></h1>
          <p class="admin__body admin__body--muted" id="project-description"></p>
        </div>
        <div class="portal__project-actions">
          <span id="status-badge" style="margin-right:var(--space-3);"></span>
          <a class="admin__btn-primary portal__download-btn" id="download-btn" href="#" target="_self">
            Download files
          </a>
          <span class="portal__download-hint" id="download-hint" hidden>
            No originals available yet.
          </span>
        </div>
      </div>

      <!-- Gallery lightbox -->
      <div class="portal__viewer" id="portal-viewer">
        <div class="portal__viewer-main">
          <img class="portal__viewer-image" id="viewer-image" src="" alt="">
        </div>
        <div class="portal__thumbs" id="portal-thumbs"></div>
      </div>

      <!-- YouTube reel -->
      <div class="portal__reel" id="portal-reel" hidden>
        <p class="admin__label" style="margin-bottom:var(--space-3);">Cinematic tour</p>
        <div class="portal__reel-wrap">
          <iframe id="reel-iframe" class="portal__reel-iframe"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen loading="lazy"></iframe>
        </div>
      </div>

    </div>

      <div id="portal-videos" hidden>
        <p class="admin__label" style="margin-bottom:var(--space-4);">VIDEOS</p>
        <div id="portal-videos-list"></div>
      </div>

    </div>

  </main>

  <script type="module">
    const logoutBtn   = document.getElementById('logout-btn');
    const loading     = document.getElementById('page-loading');
    const errorWrap   = document.getElementById('page-error-wrap');
    const errorMsg    = document.getElementById('page-error-msg');
    const content     = document.getElementById('page-content');

    const projectTitle    = document.getElementById('project-title');
    const projectLocation = document.getElementById('project-location');
    const projectDesc     = document.getElementById('project-description');
    const downloadBtn     = document.getElementById('download-btn');


    const viewerImage = document.getElementById('viewer-image');
    const thumbsWrap  = document.getElementById('portal-thumbs');

    const reelSection = document.getElementById('portal-reel');
    const reelIframe  = document.getElementById('reel-iframe');

    let allImages    = [];
    let activeIndex  = 0;

    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/portal/login';
    });

    (async () => {
      const params = new URLSearchParams(window.location.search);
      const slug   = params.get('slug') || '';

      if (!slug) { showError('No project specified.'); return; }

      const me = await fetch('/api/auth/me', { headers: { Accept: 'application/json' } });
      if (!me.ok) { window.location.href = '/portal/login'; return; }

      const res  = await fetch(`/api/portal/projects/${encodeURIComponent(slug)}`, {
        headers: { Accept: 'application/json' },
      });
      const body = res.ok ? await res.json() : null;

      if (!body?.project) { showError('Project not found.'); return; }

      const p = body.project;
      document.title = `${p.title} — Vesta Folio`;
      projectTitle.textContent    = p.title;
      projectLocation.textContent = `${p.location} · ${p.year}`;
      projectDesc.textContent     = p.description;

      // Gallery
      allImages = [p.hero_image, ...(p.gallery || [])].filter(Boolean);

      if (allImages.length > 0) {
        viewerImage.src = allImages[0];
        viewerImage.alt = p.title;
        renderThumbs();
      }

      // Download images button (zip of WebP gallery)
      downloadBtn.href = `/api/portal/projects/${encodeURIComponent(slug)}/download`;

      // Video file download links - direct R2 URLs, no Worker proxy
      const vfRes = await fetch(`/api/portal/projects/${encodeURIComponent(slug)}/video-files`, { headers: { Accept: 'application/json' } });
      if (vfRes.ok) {
        const vfBody = await vfRes.json().catch(() => ({}));
        const vfiles = vfBody.video_files || [];
        if (vfiles.length) {
          const vwrap = document.getElementById('video-download-wrap');
          const vlist = document.getElementById('video-download-list');
          if (vwrap && vlist) {
            vwrap.hidden = false;
            vlist.innerHTML = vfiles.map(f =>
              `<a href="${esc(f.url)}" download="${esc(f.name)}" class="admin__btn-ghost portal__download-btn" style="display:block;margin-bottom:var(--space-2);">${esc(f.name)}</a>`
            ).join('');
          }
        }
      }

      // YouTube reel
      if (p.youtube_id) {
        reelIframe.src  = `https://www.youtube.com/embed/${p.youtube_id}?rel=0&modestbranding=1`;
        reelIframe.title = `${p.title} - cinematic tour`;
        reelSection.hidden = false;
      }

      // Status badge
      const statusBadgeEl = document.getElementById('status-badge');
      if (statusBadgeEl && p.status) {
        const SC = { Booked:'gold', Filming:'gold', Editing:'gold', Delivered:'green', Archived:'neutral' };
        const cls = SC[p.status] || 'neutral';
        statusBadgeEl.innerHTML = `<span class="dash__badge dash__badge--${cls}">${esc(p.status)}</span>`;
      }

      // Additional videos
      const portalVideos = document.getElementById('portal-videos');
      const portalVideosList = document.getElementById('portal-videos-list');
      const videos = p.videos || [];
      if (portalVideos && portalVideosList && videos.length) {
        portalVideos.hidden = false;
        portalVideosList.innerHTML = videos.map(v => {
          if (v.platform === 'youtube') {
            const titleHtml = v.title ? `<p class="admin__label" style="margin-bottom:var(--space-2);">${esc(v.title)}</p>` : '';
            return `<div style="margin-bottom:var(--space-6);">${titleHtml}<div class="portal__reel-wrap"><iframe src="https://www.youtube.com/embed/${esc(v.video_id)}" class="portal__reel-iframe" frameborder="0" allowfullscreen loading="lazy"></iframe></div></div>`;
          }
          if (v.platform === 'reels') {
            const titleHtml = v.title ? `<p class="admin__body admin__body--muted" style="margin-bottom:var(--space-1);">${esc(v.title)}</p>` : '';
            return `<div style="margin-bottom:var(--space-4);">${titleHtml}<a href="https://www.instagram.com/reel/${esc(v.video_id)}/" target="_blank" rel="noopener" class="admin__btn-ghost" style="display:inline-block;">Watch on Instagram Reels</a></div>`;
          }
          const titleHtml = v.title ? `<p class="admin__body admin__body--muted" style="margin-bottom:var(--space-1);">${esc(v.title)}</p>` : '';
          return `<div style="margin-bottom:var(--space-4);">${titleHtml}<p class="admin__body admin__body--muted">TikTok: ${esc(v.video_id)}</p></div>`;
        }).join('');
      }

      loading.hidden  = true;
      content.hidden  = false;
    })();

    function renderThumbs() {
      thumbsWrap.innerHTML = '';
      if (allImages.length <= 1) return;

      allImages.forEach((src, i) => {
        const btn = document.createElement('button');
        btn.className = `portal__thumb${i === 0 ? ' portal__thumb--active' : ''}`;
        btn.type      = 'button';
        btn.setAttribute('aria-label', `View image ${i + 1}`);
        btn.dataset.index = i;

        const img = document.createElement('img');
        img.src     = src;
        img.loading = 'lazy';
        btn.appendChild(img);

        btn.addEventListener('click', () => setActive(i));
        thumbsWrap.appendChild(btn);
      });
    }

    function setActive(idx) {
      activeIndex       = idx;
      viewerImage.src   = allImages[idx];
      thumbsWrap.querySelectorAll('.portal__thumb').forEach((b, i) => {
        b.classList.toggle('portal__thumb--active', i === idx);
      });
    }

    document.addEventListener('keydown', (e) => {
      if (allImages.length <= 1) return;
      if (e.key === 'ArrowRight') setActive((activeIndex + 1) % allImages.length);
      if (e.key === 'ArrowLeft')  setActive((activeIndex - 1 + allImages.length) % allImages.length);
    });

    function showError(msg) {
      loading.hidden       = true;
      errorWrap.hidden     = false;
      errorMsg.textContent = msg;
    }
  </script>
</body>
</html>
