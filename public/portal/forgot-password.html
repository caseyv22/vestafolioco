<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Vesta Folio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/brand/favicon.ico">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/admin/login.css">
</head>
<body class="login-page">
  <main class="login">
    <div class="login__inner">
      <a class="login__logo" href="/" aria-label="Vesta Folio home">
        <img src="/brand/vesta-folio-horizontal.svg" alt="Vesta Folio" width="180">
      </a>
      <p class="login__label">CLIENT PORTAL</p>
      <div id="form-state">
        <h1 class="login__heading">Reset your password.</h1>
        <p class="login__body">Enter your email and we'll send a link to set a new password.</p>
        <p class="login__error" id="forgot-error" hidden></p>
        <form class="login__form" id="forgot-form" novalidate>
          <div class="login__field">
            <label class="login__label-input" for="email">Email</label>
            <input class="login__input" type="email" id="email" name="email"
                   autocomplete="email" required>
          </div>
          <button class="login__submit" type="submit" id="forgot-submit">Send reset link</button>
        </form>
      </div>
      <div id="success-state" hidden>
        <p class="login__success">If an account exists with that email, a reset link is on its way. The link expires in 24 hours.</p>
      </div>
      <p class="login__footer" style="margin-top:var(--space-4);">
        <a class="login__link" href="/portal/login">Back to sign in</a>
      </p>
    </div>
  </main>
  <script type="module">
    const form    = document.getElementById('forgot-form');
    const error   = document.getElementById('forgot-error');
    const submit  = document.getElementById('forgot-submit');
    const formDiv = document.getElementById('form-state');
    const succDiv = document.getElementById('success-state');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.hidden = true;
      submit.disabled = true;
      submit.textContent = 'Sending…';
      try {
        await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: form.email.value.trim() }),
        });
        // Always show success — no enumeration
        formDiv.hidden = true;
        succDiv.hidden = false;
      } catch {
        error.textContent = 'Could not connect. Try again.';
        error.hidden = false;
        submit.disabled = false;
        submit.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
